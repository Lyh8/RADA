action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000
evaluation_epsilon: 0.0

target_update_interval: 200

agent_output_type: "q"
learner: "q_learner"
double_q: True
mixer: "qmix"
mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

name: "qmix_recl_tracker"

# RECL options
use_recl: True
agent_embedding_dim: 128
role_embedding_dim: 64
multi_steps: 10
train_recl_freq: 2
recl_lr: 0.0005
role_tau: 0.005
recl_loss_weight: 0.1

# Tracker options
use_tracker_training: True
tracker_lr: 0.0005
tracker_loss_weight: 0.2